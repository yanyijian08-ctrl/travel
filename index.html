<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行记忆</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fdf6f0;
    color: #5c4b3c;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  header {
    text-align: center;
    padding: 56px 20px 40px;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: #6b5744;
  }

  header p {
    font-size: 0.9rem;
    color: #b8a894;
    margin-top: 6px;
  }

  /* --- Mode toggle --- */
  .mode-toggle {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-top: 18px;
  }

  .mode-toggle button {
    border: 1px solid #d4b896;
    background: transparent;
    color: #9b8a74;
    padding: 7px 22px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.04em;
    transition: all 0.25s ease;
  }

  .mode-toggle button:first-child { border-radius: 6px 0 0 6px; }
  .mode-toggle button:last-child  { border-radius: 0 6px 6px 0; border-left: none; }

  .mode-toggle button.active {
    background: #d4a574;
    color: #fff;
    border-color: #d4a574;
  }

  .gallery {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 80px;
    column-count: 3;
    column-gap: 20px;
  }

  /* --- Polaroid card --- */
  .gallery-item {
    break-inside: avoid;
    margin-bottom: 20px;
    cursor: pointer;
    background: #faf7f2;
    padding: 10px 10px 32px;
    border-radius: 4px;
    box-shadow:
      0 1px 3px rgba(80, 50, 20, 0.06),
      0 3px 12px rgba(80, 50, 20, 0.08),
      0 6px 24px rgba(80, 50, 20, 0.04);
    transition: box-shadow 0.35s ease, transform 0.35s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .gallery-item:hover {
    box-shadow:
      0 2px 6px rgba(80, 50, 20, 0.1),
      0 6px 20px rgba(80, 50, 20, 0.12),
      0 12px 36px rgba(80, 50, 20, 0.06);
    transform: translateY(-3px);
  }

  .gallery-item:active {
    transform: scale(0.96);
  }

  .gallery-item .photo-frame {
    width: 100%;
    overflow: hidden;
    border-radius: 3px;
    line-height: 0;
  }

  .gallery-item img {
    width: 100%;
    display: block;
  }

  /* Date stamp */
  .gallery-item .date-stamp {
    text-align: center;
    margin-top: 10px;
    font-family: "Brush Script MT", "KaiTi", "STKaiti", cursive, serif;
    font-size: 0.85rem;
    color: #c47a4a;
    letter-spacing: 0.04em;
    line-height: 1;
    opacity: 0.8;
    cursor: text;
    border: 1px dashed transparent;
    border-radius: 3px;
    padding: 2px 6px;
    transition: border-color 0.2s ease, background 0.2s ease;
    outline: none;
    min-width: 60px;
    -webkit-user-select: text;
    user-select: text;
  }

  .gallery-item .date-stamp:hover {
    border-color: #d4a574;
    background: rgba(212, 165, 116, 0.08);
  }

  .gallery-item .date-stamp:focus {
    border-color: #c47a4a;
    background: rgba(212, 165, 116, 0.12);
    opacity: 1;
  }

  /* --- Scroll reveal --- */
  .gallery-item.reveal {
    opacity: 0;
    transform: translateY(36px);
    transition: opacity 0.55s ease-out, transform 0.55s ease-out;
  }

  .gallery-item.reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* --- Floating random button --- */
  .btn-random {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: #d4a574;
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(180, 120, 60, 0.3);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: breathe 3s ease-in-out infinite;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s ease;
  }

  .btn-random:hover {
    background: #c8955f;
  }

  .btn-random:active {
    animation: none;
  }

  @keyframes breathe {
    0%, 100% { box-shadow: 0 4px 18px rgba(180, 120, 60, 0.3); transform: scale(1); }
    50%      { box-shadow: 0 6px 28px rgba(180, 120, 60, 0.45); transform: scale(1.06); }
  }

  /* --- Lightbox --- */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(30, 22, 14, 0.94);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    touch-action: none;
  }

  .lightbox.active {
    opacity: 1;
    pointer-events: auto;
  }

  .lightbox-img-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 60px 16px 90px;
    overflow: hidden;
  }

  .lightbox-img {
    position: absolute;
    max-width: 92vw;
    max-height: 76vh;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 4px 40px rgba(0, 0, 0, 0.35);
    opacity: 0;
    transition: opacity 0.4s ease;
    -webkit-user-drag: none;
    user-select: none;
    pointer-events: none;
  }

  .lightbox-img.current {
    opacity: 1;
    position: relative;
  }

  .lightbox-img.zoomed {
    max-width: none;
    max-height: none;
    border-radius: 8px;
    cursor: grab;
  }

  .lightbox-img.zoomed:active { cursor: grabbing; }

  .lightbox-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 40px;
    height: 40px;
    border: none;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    font-size: 1.3rem;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    border: none;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    font-size: 1.2rem;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .lightbox-prev { left: 8px; }
  .lightbox-next { right: 8px; }

  .lightbox-counter {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.5);
    font-size: 0.85rem;
    letter-spacing: 0.06em;
  }

  .btn-shuffle {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 0.04em;
    z-index: 10;
    transition: background 0.2s ease;
  }

  .btn-shuffle:hover {
    background: rgba(255, 255, 255, 0.2);
  }

  footer {
    text-align: center;
    padding: 0 20px 44px;
    color: #c8b8a4;
    font-size: 0.8rem;
  }

  /* Tablet */
  @media (max-width: 900px) {
    .gallery {
      column-count: 2;
      column-gap: 14px;
      padding: 0 14px 70px;
    }
    .gallery-item { margin-bottom: 14px; padding: 8px 8px 24px; }
  }

  /* Phone */
  @media (max-width: 500px) {
    header { padding: 40px 16px 28px; }
    header h1 { font-size: 1.5rem; }

    .gallery {
      column-count: 2;
      column-gap: 10px;
      padding: 0 10px 60px;
    }
    .gallery-item { margin-bottom: 10px; padding: 7px 7px 20px; }
    .gallery-item .date-stamp { font-size: 0.72rem; margin-top: 6px; }

    .btn-random { width: 48px; height: 48px; bottom: 20px; right: 20px; font-size: 1.3rem; }

    .lightbox-nav { width: 36px; height: 36px; font-size: 1rem; }
    .lightbox-prev { left: 4px; }
    .lightbox-next { right: 4px; }
    .lightbox-close { top: 8px; right: 8px; width: 36px; height: 36px; }
    .lightbox-img-wrap { padding: 50px 8px 80px; }
  }

  /* ==================== ALBUM MODE ==================== */
  .album-container {
    display: none;
    position: fixed;
    inset: 0;
    background: #2a2018;
    z-index: 500;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    perspective: 1200px;
  }

  .album-container.active {
    display: flex;
  }

  .album-header {
    position: absolute;
    top: 12px;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
    padding: 0 60px;
  }

  .album-sort-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    padding: 6px 16px;
    border-radius: 16px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.04em;
    transition: all 0.2s ease;
  }

  .album-sort-btn.active {
    background: rgba(212,165,116,0.35);
    border-color: #d4a574;
    color: #fff;
  }

  .album-close-btn {
    position: absolute;
    top: 12px;
    right: 16px;
    width: 40px;
    height: 40px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    font-size: 1.3rem;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Album polaroid page */
  .album-polaroid {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 80px 20px 100px;
    transform-style: preserve-3d;
    transition: transform 0.45s ease;
  }

  .album-polaroid.flip-left {
    transform: rotateY(-25deg) scale(0.9);
    opacity: 0;
    transition: transform 0.35s ease-in, opacity 0.35s ease-in;
  }

  .album-polaroid.flip-right {
    transform: rotateY(25deg) scale(0.9);
    opacity: 0;
    transition: transform 0.35s ease-in, opacity 0.35s ease-in;
  }

  .album-polaroid.flip-enter {
    transform: rotateY(0) scale(1);
    opacity: 1;
    transition: transform 0.4s ease-out, opacity 0.4s ease-out;
  }

  .album-card {
    background: #faf7f2;
    padding: 14px 14px 40px;
    border-radius: 4px;
    box-shadow:
      0 2px 8px rgba(0,0,0,0.2),
      0 8px 32px rgba(0,0,0,0.3);
    max-width: 88vw;
    max-height: 78vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .album-card .photo-frame {
    overflow: hidden;
    border-radius: 3px;
    line-height: 0;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .album-card img {
    max-width: 100%;
    max-height: 55vh;
    display: block;
    object-fit: contain;
    -webkit-user-drag: none;
    user-select: none;
  }

  .album-card .date-stamp {
    margin-top: 12px;
    font-family: "Brush Script MT", "KaiTi", "STKaiti", cursive, serif;
    font-size: 0.95rem;
    color: #c47a4a;
    letter-spacing: 0.04em;
    cursor: text;
    border: 1px dashed transparent;
    border-radius: 3px;
    padding: 2px 8px;
    outline: none;
    -webkit-user-select: text;
    user-select: text;
  }

  .album-card .date-stamp:hover {
    border-color: #d4a574;
  }

  .album-card .date-stamp:focus {
    border-color: #c47a4a;
  }

  /* Album navigation */
  .album-nav-bottom {
    position: absolute;
    bottom: 24px;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 10;
  }

  .album-nav-btn {
    width: 44px;
    height: 44px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 1.4rem;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease;
  }

  .album-nav-btn:hover { background: rgba(255,255,255,0.2); }
  .album-nav-btn:active { background: rgba(255,255,255,0.3); }

  .album-page-num {
    color: rgba(255,255,255,0.5);
    font-size: 0.9rem;
    letter-spacing: 0.06em;
    min-width: 60px;
    text-align: center;
  }

  @media (max-width: 500px) {
    .album-card { padding: 10px 10px 28px; max-width: 94vw; }
    .album-card .date-stamp { font-size: 0.8rem; margin-top: 8px; }
    .album-card img { max-height: 50vh; }
    .album-polaroid { padding: 70px 12px 90px; }
    .album-nav-btn { width: 40px; height: 40px; font-size: 1.2rem; }
    .album-nav-bottom { bottom: 16px; gap: 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>在路上</h1>
  <p>旅行记忆</p>
  <div class="mode-toggle" id="modeToggle">
    <button class="active" data-mode="gallery">画廊</button>
    <button data-mode="album">相册</button>
  </div>
</header>

<main class="gallery" id="gallery"></main>

<footer id="galleryFooter">
  每一次出发，都是与世界的重逢
  <span style="display:block;margin-top:8px;">
    <a href="javascript:exportDates()" style="color:#c8b8a4;font-size:0.75rem;text-decoration:underline;cursor:pointer;">导出日期备份</a>
  </span>
</footer>

<!-- ====== Album Mode ====== -->
<div class="album-container" id="albumContainer">
  <div class="album-header">
    <button class="album-sort-btn active" data-sort="date">时间排序</button>
    <button class="album-sort-btn" data-sort="random">随机排序</button>
  </div>
  <button class="album-close-btn" id="albumClose">&times;</button>

  <div class="album-polaroid" id="albumPolaroid">
    <div class="album-card" id="albumCard">
      <div class="photo-frame">
        <img id="albumImg" src="" alt="">
      </div>
      <div class="date-stamp" id="albumDate" contenteditable="true"></div>
    </div>
  </div>

  <div class="album-nav-bottom">
    <button class="album-nav-btn" id="albumPrev">&lsaquo;</button>
    <span class="album-page-num" id="albumPageNum">1 / 1</span>
    <button class="album-nav-btn" id="albumNext">&rsaquo;</button>
  </div>
</div>

<button class="btn-random" id="btnRandom" aria-label="随手翻" title="随手翻一张">🎲</button>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="btnClose">&times;</button>
  <button class="lightbox-nav lightbox-prev" id="btnPrev">&lsaquo;</button>
  <button class="lightbox-nav lightbox-next" id="btnNext">&rsaquo;</button>
  <div class="lightbox-img-wrap" id="lightboxWrap">
    <img class="lightbox-img current" id="lightboxImgA" src="" alt="">
    <img class="lightbox-img" id="lightboxImgB" src="" alt="">
  </div>
  <button class="btn-shuffle" id="btnShuffle">再翻一张</button>
  <span class="lightbox-counter" id="lightboxCounter"></span>
</div>

<script>
const IMG_EXTS = new Set(["jpg", "jpeg", "png", "gif", "webp", "bmp", "svg"]);
let images = [];

// --- Dates: cloud (dates.json) + local (localStorage) ---
const STORAGE_KEY = "gallery_dates";
let savedDates = {};

async function loadSavedDates() {
  // 1. Load cloud dates (dates.json on server)
  try {
    const resp = await fetch("dates.json?t=" + Date.now());
    if (resp.ok) savedDates = await resp.json();
  } catch (e) { savedDates = {}; }
  // 2. Merge local overrides (localStorage wins)
  try {
    const local = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    Object.assign(savedDates, local);
  } catch (e) { /* ignore */ }
}

function saveDate(filename, date) {
  savedDates[filename] = date;
  // Save to localStorage for local persistence
  try {
    const local = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    local[filename] = date;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(local));
  } catch (e) { /* ignore */ }
}

function getDateForImage(src) {
  if (savedDates[src]) return savedDates[src];
  // Stable date from filename hash
  let hash = 0;
  for (let i = 0; i < src.length; i++) hash = ((hash << 5) - hash) + src.charCodeAt(i);
  hash = Math.abs(hash);
  const y = 2024 + (hash % 2);
  const m = (Math.floor(hash / 7) % 12);
  const d = (Math.floor(hash / 13) % 28) + 1;
  const date = new Date(y, m, d);
  const str = `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, "0")}.${String(date.getDate()).padStart(2, "0")}`;
  savedDates[src] = str;
  return str;
}

// Export dates button — shows when there are unsaved edits
function exportDates() {
  const blob = new Blob([JSON.stringify(savedDates, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "dates.json";
  a.click();
  URL.revokeObjectURL(a.href);
}

// --- Load image list ---
async function loadImageList() {
  // 1. Try images.json (works on GitHub Pages & any static host)
  try {
    const resp = await fetch("images.json?t=" + Date.now());
    if (resp.ok) { images = await resp.json(); return; }
  } catch (e) { /* proceed */ }

  // 2. Try server directory listing (works with local python/http-server)
  try {
    const resp = await fetch("./");
    const html = await resp.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");
    const links = doc.querySelectorAll("a");
    const found = [];
    for (const a of links) {
      const href = a.getAttribute("href");
      if (!href) continue;
      const ext = href.split(".").pop().toLowerCase();
      if (IMG_EXTS.has(ext)) found.push(href);
    }
    if (found.length > 0) { images = found; return; }
  } catch (e) { /* fallback */ }

  // 3. Hardcoded fallback
  images = [
    "04b7cb93c1b772b72c9018be94472314.jpg",
    "0e868ba5c5552a48af12a81721bf3e26.jpg",
    "2efbf349f129ef385c0ef3ef0bb3cb15.jpg",
    "3a71267bbca171f43a43038bc9a510de.jpg",
    "3da0750e557fd9b626ad57136bd208e6.jpg",
    "59583186484dac4168fb29f9c8b3101b.jpg",
    "7c9a22a1d866c4707a439ae4b37b11a7.jpg",
    "8e87536f05b0f8422236cee7ff4e238f.jpg",
    "9dde0e9e52816937a844b51a5ea33079.jpg",
    "b6e4d01908d1b643443825c372558916.jpg",
    "c46dbab535bd7db9da4f4f925101dc0d.jpg",
    "d34a383761aa9aec7ee366872645190a.jpg",
    "3e3b641ad09fba670d75e4aa05edef73.jpg",
    "95fc5ca6911998a28ecb9271bc2b6391.jpg",
    "df65b7d58e17891a1aa2bd398d6d5c6f.jpg",
    "f12bb51ece7af763bfa1c097248a7655.jpg",
    "f7bc97b503267ad5995c999a8ce177bf.jpg",
    "微信图片_20260521084924_620_85.jpg",
    "微信图片_20260521095120_640_85.jpg"
  ];
}

// --- Build gallery ---
const gallery = document.getElementById("gallery");

function buildGallery() {
  gallery.innerHTML = "";
  images.forEach((src, i) => {
    const card = document.createElement("div");
    card.className = "gallery-item reveal";
    // Random slight rotation: ±2.5°
    const deg = ((Math.random() * 5) - 2.5).toFixed(2);
    card.style.transform = `rotate(${deg}deg)`;
    card.style.transition = "box-shadow 0.35s ease, transform 0.35s ease, opacity 0.55s ease-out";

    const frame = document.createElement("div");
    frame.className = "photo-frame";

    const img = document.createElement("img");
    img.src = src;
    img.alt = "";
    img.loading = "lazy";

    const date = document.createElement("div");
    date.className = "date-stamp";
    date.contentEditable = "true";
    date.textContent = getDateForImage(src);
    date.addEventListener("blur", () => saveDate(src, date.textContent.trim() || getDateForImage(src)));
    date.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); date.blur(); } });
    // Stop click from opening lightbox when editing date
    date.addEventListener("click", (e) => e.stopPropagation());

    frame.appendChild(img);
    card.appendChild(frame);
    card.appendChild(date);
    card.addEventListener("click", () => openLightbox(i));
    gallery.appendChild(card);
  });

  // Reveal on scroll
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, idx) => {
      if (entry.isIntersecting) {
        const card = entry.target;
        // Stagger delay per row
        const delay = Math.min(idx * 60, 400);
        setTimeout(() => card.classList.add("visible"), delay);
        observer.unobserve(card);
      }
    });
  }, { threshold: 0.15, rootMargin: "0px 0px -40px 0px" });

  document.querySelectorAll(".gallery-item").forEach((card) => observer.observe(card));
}

// --- Lightbox ---
const lightbox = document.getElementById("lightbox");
const lightboxWrap = document.getElementById("lightboxWrap");
const lightboxCounter = document.getElementById("lightboxCounter");
const imgA = document.getElementById("lightboxImgA");
const imgB = document.getElementById("lightboxImgB");
let currentIndex = 0;
let activeImg = imgA;
let standbyImg = imgB;
let isTransitioning = false;

function openLightbox(index) {
  currentIndex = index;
  resetZoom();
  isTransitioning = true;
  loadImage(activeImg, images[currentIndex]);
  activeImg.classList.add("current");
  standbyImg.classList.remove("current");
  lightbox.classList.add("active");
  document.body.style.overflow = "hidden";
  lightboxCounter.textContent = `${currentIndex + 1} / ${images.length}`;
  setTimeout(() => { isTransitioning = false; }, 400);
}

function closeLightbox() {
  lightbox.classList.remove("active");
  document.body.style.overflow = "";
  resetZoom();
}

function loadImage(img, src) {
  if (img.src.endsWith(src)) return;
  img.src = src;
}

function swapImages() {
  isTransitioning = true;
  standbyImg.src = images[currentIndex];
  standbyImg.classList.add("current");
  activeImg.classList.remove("current");
  const temp = activeImg;
  activeImg = standbyImg;
  standbyImg = temp;
  lightboxCounter.textContent = `${currentIndex + 1} / ${images.length}`;
  resetZoom();
  setTimeout(() => { isTransitioning = false; }, 400);
}

function prevImage() {
  if (isTransitioning) return;
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  swapImages();
}

function nextImage() {
  if (isTransitioning) return;
  currentIndex = (currentIndex + 1) % images.length;
  swapImages();
}

function randomImage() {
  if (isTransitioning || images.length < 2) return;
  let idx;
  do { idx = Math.floor(Math.random() * images.length); } while (idx === currentIndex);
  currentIndex = idx;
  swapImages();
}

document.getElementById("btnClose").addEventListener("click", closeLightbox);
document.getElementById("btnPrev").addEventListener("click", prevImage);
document.getElementById("btnNext").addEventListener("click", nextImage);
document.getElementById("btnShuffle").addEventListener("click", randomImage);

lightbox.addEventListener("click", (e) => {
  if (e.target === lightbox) closeLightbox();
});

// "随手翻" floating button
document.getElementById("btnRandom").addEventListener("click", () => {
  const idx = Math.floor(Math.random() * images.length);
  openLightbox(idx);
});

// Keyboard
document.addEventListener("keydown", (e) => {
  if (!lightbox.classList.contains("active")) return;
  if (e.key === "Escape") closeLightbox();
  if (e.key === "ArrowLeft") prevImage();
  if (e.key === "ArrowRight") nextImage();
});

// --- Pinch Zoom ---
let scale = 1, panX = 0, panY = 0;
let lastDist = 0, lastPanX = 0, lastPanY = 0;
let isZoomed = false;
let pinchCenterX = 0, pinchCenterY = 0;
let doubleTapTimer = null;

function resetZoom() {
  scale = 1; panX = 0; panY = 0; isZoomed = false;
  applyZoom();
  activeImg.classList.remove("zoomed");
}

function applyZoom() {
  activeImg.style.transform = isZoomed
    ? `translate(${panX}px, ${panY}px) scale(${scale})`
    : "";
}

function getPinchDist(t) {
  return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
}

function getPinchCenter(t) {
  return { x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 };
}

lightboxWrap.addEventListener("touchstart", (e) => {
  if (e.touches.length === 2) {
    lastDist = getPinchDist(e.touches);
    const c = getPinchCenter(e.touches);
    pinchCenterX = c.x; pinchCenterY = c.y;
    lastPanX = panX; lastPanY = panY;
    activeImg.classList.add("zoomed");
  } else if (e.touches.length === 1 && isZoomed) {
    lastPanX = panX; lastPanY = panY;
    pinchCenterX = e.touches[0].clientX;
    pinchCenterY = e.touches[0].clientY;
    e.preventDefault();
  }
}, { passive: false });

lightboxWrap.addEventListener("touchmove", (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dist = getPinchDist(e.touches);
    const ns = Math.min(5, Math.max(1, scale * (dist / lastDist)));
    if (ns > 1.05) isZoomed = true;
    const c = getPinchCenter(e.touches);
    const ratio = ns / (scale || 1);
    panX = pinchCenterX - ratio * (pinchCenterX - lastPanX);
    panY = pinchCenterY - ratio * (pinchCenterY - lastPanY);
    scale = ns;
    applyZoom();
  } else if (e.touches.length === 1 && isZoomed) {
    e.preventDefault();
    panX = lastPanX + (e.touches[0].clientX - pinchCenterX);
    panY = lastPanY + (e.touches[0].clientY - pinchCenterY);
    applyZoom();
  }
}, { passive: false });

lightboxWrap.addEventListener("touchend", (e) => {
  if (scale < 1.05) resetZoom();
  if (e.touches.length === 0) lastDist = 0;
});

// Double-tap zoom
lightboxWrap.addEventListener("click", (e) => {
  if (e.target === activeImg && !isZoomed) {
    if (doubleTapTimer) {
      clearTimeout(doubleTapTimer);
      doubleTapTimer = null;
      isZoomed = true; scale = 2.5; panX = 0; panY = 0;
      activeImg.classList.add("zoomed");
      applyZoom();
    } else {
      doubleTapTimer = setTimeout(() => { doubleTapTimer = null; }, 300);
    }
  } else if (e.target === activeImg && isZoomed) {
    resetZoom();
  }
});

// Wheel zoom
lightboxWrap.addEventListener("wheel", (e) => {
  e.preventDefault();
  const rect = activeImg.getBoundingClientRect();
  const mx = e.clientX - (rect.left + rect.width / 2);
  const my = e.clientY - (rect.top + rect.height / 2);
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const ns = Math.min(5, Math.max(1, scale * factor));
  if (ns > 1.05) {
    isZoomed = true;
    activeImg.classList.add("zoomed");
    const ratio = ns / scale;
    panX = panX * ratio - mx * (ratio - 1);
    panY = panY * ratio - my * (ratio - 1);
    scale = ns;
    applyZoom();
  } else { resetZoom(); }
}, { passive: false });

// --- Swipe to navigate (only when not zoomed) ---
let swipeX = 0, swipeY = 0;
lightbox.addEventListener("touchstart", (e) => {
  if (e.touches.length === 1 && !isZoomed) {
    swipeX = e.touches[0].clientX; swipeY = e.touches[0].clientY;
  }
}, { passive: true });

lightbox.addEventListener("touchend", (e) => {
  if (isZoomed || e.touches.length > 0) return;
  const dx = e.changedTouches[0].clientX - swipeX;
  const dy = e.changedTouches[0].clientY - swipeY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    dx > 0 ? prevImage() : nextImage();
  }
});

// --- Album mode ---
const albumContainer = document.getElementById("albumContainer");
const albumPolaroid = document.getElementById("albumPolaroid");
const albumImg = document.getElementById("albumImg");
const albumDate = document.getElementById("albumDate");
const albumPageNum = document.getElementById("albumPageNum");
let albumImages = [];
let albumPage = 0;
let albumSort = "date";
let albumFlipLock = false;

function getDateValue(src) {
  if (savedDates[src]) return savedDates[src];
  // Generate stable date from filename hash
  let hash = 0;
  for (let i = 0; i < src.length; i++) hash = ((hash << 5) - hash) + src.charCodeAt(i);
  hash = Math.abs(hash);
  const y = 2024 + (hash % 2);
  const m = (Math.floor(hash / 7) % 12);
  const d = (Math.floor(hash / 13) % 28) + 1;
  const date = new Date(y, m, d);
  return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, "0")}.${String(date.getDate()).padStart(2, "0")}`;
}

function parseDate(str) {
  const parts = str.split(".");
  if (parts.length === 3) return new Date(+parts[0], +parts[1] - 1, +parts[2]);
  return new Date(0);
}

function buildAlbumList() {
  const list = [...images];
  if (albumSort === "date") {
    list.sort((a, b) => {
      const da = savedDates[a] ? parseDate(savedDates[a]) : parseDate(getDateValue(a));
      const db = savedDates[b] ? parseDate(savedDates[b]) : parseDate(getDateValue(b));
      return db - da; // newest first
    });
  } else {
    // Fisher-Yates shuffle
    for (let i = list.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [list[i], list[j]] = [list[j], list[i]];
    }
  }
  return list;
}

function openAlbum() {
  albumImages = buildAlbumList();
  albumPage = 0;
  renderAlbumPage();
  albumContainer.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeAlbum() {
  albumContainer.classList.remove("active");
  document.body.style.overflow = "";
}

function renderAlbumPage() {
  if (albumImages.length === 0) return;
  const src = albumImages[albumPage];
  albumImg.src = src;
  albumDate.textContent = savedDates[src] || getDateValue(src);
  albumPageNum.textContent = `${albumPage + 1} / ${albumImages.length}`;
}

function albumPrev() {
  if (albumFlipLock || albumImages.length < 2) return;
  albumFlipLock = true;
  // Flip current out to the right
  albumPolaroid.classList.add("flip-right");
  albumPolaroid.classList.remove("flip-enter");
  setTimeout(() => {
    albumPage = (albumPage - 1 + albumImages.length) % albumImages.length;
    renderAlbumPage();
    albumPolaroid.classList.remove("flip-right");
    albumPolaroid.classList.add("flip-enter");
    setTimeout(() => {
      albumPolaroid.classList.remove("flip-enter");
      albumFlipLock = false;
    }, 400);
  }, 350);
}

function albumNext() {
  if (albumFlipLock || albumImages.length < 2) return;
  albumFlipLock = true;
  // Flip current out to the left
  albumPolaroid.classList.add("flip-left");
  albumPolaroid.classList.remove("flip-enter");
  setTimeout(() => {
    albumPage = (albumPage + 1) % albumImages.length;
    renderAlbumPage();
    albumPolaroid.classList.remove("flip-left");
    albumPolaroid.classList.add("flip-enter");
    setTimeout(() => {
      albumPolaroid.classList.remove("flip-enter");
      albumFlipLock = false;
    }, 400);
  }, 350);
}

// Album date edit
albumDate.addEventListener("blur", () => {
  const src = albumImages[albumPage];
  saveDate(src, albumDate.textContent.trim() || getDateValue(src));
});
albumDate.addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); albumDate.blur(); }
});

// Album controls
document.getElementById("albumPrev").addEventListener("click", albumPrev);
document.getElementById("albumNext").addEventListener("click", albumNext);
document.getElementById("albumClose").addEventListener("click", closeAlbum);

// Album sort buttons
document.querySelectorAll(".album-sort-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".album-sort-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    albumSort = btn.dataset.sort;
    albumImages = buildAlbumList();
    albumPage = 0;
    renderAlbumPage();
  });
});

// Album swipe
let albumSwipeX = 0, albumSwipeY = 0;
albumContainer.addEventListener("touchstart", (e) => {
  albumSwipeX = e.touches[0].clientX;
  albumSwipeY = e.touches[0].clientY;
}, { passive: true });

albumContainer.addEventListener("touchend", (e) => {
  const dx = e.changedTouches[0].clientX - albumSwipeX;
  const dy = e.changedTouches[0].clientY - albumSwipeY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    dx > 0 ? albumPrev() : albumNext();
  }
});

// Album click on polaroid to open full lightbox
albumImg.addEventListener("click", () => {
  const src = albumImages[albumPage];
  const idx = images.indexOf(src);
  if (idx >= 0) openLightbox(idx);
});

// --- Mode toggle ---
document.querySelectorAll(".mode-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".mode-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const mode = btn.dataset.mode;
    if (mode === "gallery") {
      closeAlbum();
      document.getElementById("gallery").style.display = "";
      document.getElementById("galleryFooter").style.display = "";
      document.getElementById("btnRandom").style.display = "";
    } else {
      document.getElementById("gallery").style.display = "none";
      document.getElementById("galleryFooter").style.display = "none";
      document.getElementById("btnRandom").style.display = "none";
      openAlbum();
    }
  });
});

// Extended keyboard: also handle album mode keys
document.addEventListener("keydown", (e) => {
  if (albumContainer.classList.contains("active")) {
    if (e.key === "Escape") closeAlbum();
    if (e.key === "ArrowLeft") albumPrev();
    if (e.key === "ArrowRight") albumNext();
  }
});

// --- Init ---
loadSavedDates();
loadImageList().then(() => buildGallery());
</script>
